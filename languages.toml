# Carve language support for Helix.
#
# Merge this into your ~/.config/helix/languages.toml (or the languages.toml in
# your $HELIX_RUNTIME). See README.md for full install steps.
#
# The [[grammar]] source below points at the published upstream grammar. For
# offline grammar development against a local checkout, swap the `source` line
# for the path form (shown commented out underneath).

[[language]]
name = "carve"
scope = "source.carve"
file-types = ["crv"]
roots = []
comment-token = "%%"
indent = { tab-width = 2, unit = "  " }

[[grammar]]
name = "carve"
source = { git = "https://github.com/markup-carve/tree-sitter-carve", rev = "11a6899976f20846449685745e22236543eee08e" }

# Local (path) form -- use this for offline grammar development:
# [[grammar]]
# name = "carve"
# source = { path = "/path/to/tree-sitter-carve" }
